name: CI

on: [push, pull_request]

jobs:
  build-container:
    name: Build Container
    uses: ./.github/workflows/container.yml
    permissions:
      packages: write
    with:
      image: xdg-desktop-portal:2026-06-23.1
      containerfile: containerfiles/build.containerfile

  check-container:
    name: Check Container
    uses: ./.github/workflows/container.yml
    permissions:
      packages: write
    with:
      image: xdg-desktop-portal-checks:2026-06-21.0
      containerfile: containerfiles/check.containerfile

  build-and-test:
    name: Build and Test
    uses: ./.github/workflows/build-and-test.yml
    needs: build-container
    with:
      image: ${{ needs.build-container.outputs.image }}
      image_options: ${{ needs.build-container.outputs.image_options }}

  check:
    name: Check
    uses: ./.github/workflows/check.yml
    needs: check-container
    with:
      image: ${{ needs.check-container.outputs.image }}
      image_options: ${{ needs.check-container.outputs.image_options }}

  pages:
    name: Documentation & Website
    uses: ./.github/workflows/pages.yml
    needs: build-container
    permissions:
      contents: read
      pages: write
      id-token: write
    with:
      image: ${{ needs.build-container.outputs.image }}
      image_options: ${{ needs.build-container.outputs.image_options }}
