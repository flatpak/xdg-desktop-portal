repos:
- repo: local
  hooks:
    - id: goblint
      name: goblint linter
      language: unsupported
      entry: goblint .
      files: \.[ch]$
      pass_filenames: false
    - id: potfiles
      name: check POTFILES.in
      language: unsupported
      entry: check-potfiles.sh
      files: ^po/
      pass_filenames: false
    - id: qdbusannotations
      name: check dbus XML Qt annotations
      language: unsupported
      entry: /usr/lib/qt6/bin/qdbusxml2cpp
      files: data/.+\.xml$
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.7.0
  hooks:
    - id: ruff
    - id: ruff-format
      args: [ --check ]
- repo: https://github.com/pre-commit/mirrors-mypy
  rev: v1.14.1
  hooks:
    - id: mypy
      additional_dependencies:
        - pytest
- repo: https://codeberg.org/fsfe/reuse-tool
  rev: v6.2.0
  hooks:
  - id: reuse
